name: Package plugin source
description: Zip Blueprint Exec Flow Viewer source (same exclusions as release / CI)

inputs:
  version:
    description: Version string (use "ci" for CI smoke zip name)
    required: true
  product_slug:
    description: Filesystem-safe product name for release zip files (Blueprint Exec Flow Viewer)
    required: false
    default: Blueprint-Exec-Flow-Viewer

outputs:
  zip_path:
    description: Filename of the created zip at repo root
    value: ${{ steps.package.outputs.zip_path }}

runs:
  using: composite
  steps:
    - id: package
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        SLUG="${{ inputs.product_slug }}"
        if [[ "$VERSION" == "ci" ]]; then
          OUT="${SLUG}-ci-source.zip"
        else
          OUT="${SLUG}-${VERSION}-source.zip"
        fi
        cd Plugins/BPExecFlowViewer
        zip -r "../../${OUT}" . \
          -x "Binaries/*" \
          -x "Intermediate/*" \
          -x ".vs/*" \
          -x "*.sln" \
          -x "*.suo"
        cd ../..
        echo "zip_path=${OUT}" >> "$GITHUB_OUTPUT"
