name: Package plugin source
description: Zip BPExecFlowViewer for GitHub Release and Fab (no Binaries/Intermediate/Build/Saved)

inputs:
  version:
    description: Version string (use "ci" for CI smoke zip name)
    required: true
  product_slug:
    description: Filesystem-safe product name for release zip files (Blueprint Exec Flow Viewer)
    required: false
    default: Blueprint-Exec-Flow-Viewer

outputs:
  zip_path:
    description: Filename of the created zip at repo root
    value: ${{ steps.package.outputs.zip_path }}

runs:
  using: composite
  steps:
    - id: package
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        SLUG="${{ inputs.product_slug }}"
        if [[ "$VERSION" == "ci" ]]; then
          OUT="${SLUG}-ci.zip"
        else
          OUT="${SLUG}-${VERSION}.zip"
        fi
        cd Plugins/BPExecFlowViewer
        zip -r "../../${OUT}" . \
          -x "Binaries/*" \
          -x "Build/*" \
          -x "Intermediate/*" \
          -x "Saved/*" \
          -x ".vs/*" \
          -x "*.sln" \
          -x "*.suo"
        cd ../..
        ZIP="${OUT}"

        LIST="$(unzip -l "${ZIP}")"
        if echo "${LIST}" | grep -qE '/Binaries/|/Intermediate/|/Build/|/Saved/'; then
          echo "ERROR: zip contains excluded build folders"
          exit 1
        fi
        if ! echo "${LIST}" | grep -qF 'BPExecFlowViewer.uplugin'; then
          echo "ERROR: zip missing BPExecFlowViewer.uplugin"
          exit 1
        fi
        if ! echo "${LIST}" | grep -qF 'Source/'; then
          echo "ERROR: zip missing Source/"
          exit 1
        fi

        echo "zip_path=${OUT}" >> "$GITHUB_OUTPUT"
