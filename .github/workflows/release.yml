# Tag push (v*) or manual dispatch → source zip on every tag; Win64 zip optional via self-hosted Windows runner.
#
# Win64 job: UE_ROOT from Actions secret, runner env, or C:\Program Files\Epic Games\UE_5.7

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_FILE: Plugins/BPExecFlowViewer/BPExecFlowViewer.uplugin

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-manual" >> "$GITHUB_OUTPUT"
          fi

  package-source:
    name: Package source
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Zip plugin source
        id: package
        uses: ./.github/actions/package-plugin-source
        with:
          version: ${{ needs.version.outputs.version }}

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-zip
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

  build-win64:
    name: Build Win64 package
    needs: version
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Do not set job env UE_ROOT from secrets alone — an unset secret becomes "" and
      # wipes the runner machine's UE_ROOT. Order: secret → runner env → default UE 5.7 path.
      - name: Resolve UE_ROOT
        shell: powershell
        run: |
          $root = '${{ secrets.UE_ROOT }}'
          if ([string]::IsNullOrWhiteSpace($root)) { $root = $env:UE_ROOT }
          if ([string]::IsNullOrWhiteSpace($root)) { $root = 'C:\Program Files\Epic Games\UE_5.7' }
          $uat = Join-Path $root 'Engine\Build\BatchFiles\RunUAT.bat'
          if (-not (Test-Path $uat)) {
            throw "RunUAT not found at: $uat. Set Actions secret UE_ROOT, runner env UE_ROOT, or install UE 5.7 at the default path."
          }
          "UE_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using UE at: $root"

      # RunUAT paths under GITHUB_WORKSPACE exceed Windows MAX_PATH (~260). Build on a short fixed path.
      - name: Prepare package directory
        shell: powershell
        run: |
          $out = 'C:\_ci\bpefv'
          if (Test-Path -LiteralPath $out) { Remove-Item -LiteralPath $out -Recurse -Force }
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          "PACKAGE_OUT=$out" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "PACKAGE_OUT=$out"

      - name: Build plugin (RunUAT)
        shell: powershell
        run: |
          & "${{ github.workspace }}\Scripts\PackageForFab.bat"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Zip Win64 package
        id: zip
        shell: powershell
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $archive = "BPExecFlowViewer-${version}-Win64.zip"
          $root = $env:PACKAGE_OUT
          if (-not (Test-Path -LiteralPath $root)) { throw "Package folder missing: $root" }
          Compress-Archive -Path (Join-Path $root '*') -DestinationPath (Join-Path $env:GITHUB_WORKSPACE $archive) -Force
          "win64_zip=$archive" >> $env:GITHUB_OUTPUT

      - name: Upload Win64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: win64-zip
          path: ${{ steps.zip.outputs.win64_zip }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [version, package-source, build-win64]
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.package-source.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download source zip
        uses: actions/download-artifact@v8
        with:
          name: source-zip
          path: release-files

      - name: Download Win64 zip (optional)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: win64-zip
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-files/**
          fail_on_unmatched_files: false
