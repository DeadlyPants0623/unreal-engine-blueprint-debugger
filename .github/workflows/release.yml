# Build and publish GitHub Releases when you push a version tag (e.g. v1.0.0).
#
# Assets:
#   - BPExecFlowViewer-X.Y.Z-source.zip  — always (drop into Plugins/ and compile in UE 5.7)
#   - BPExecFlowViewer-X.Y.Z-Win64.zip   — optional; requires a self-hosted Windows runner on the
#     machine where UE is installed, plus repository secret UE_ROOT (see README).
#
# Repository secret (required for Win64 job):
#   UE_ROOT — e.g. C:\Program Files\Epic Games\UE_5.7 (must exist on the self-hosted runner PC)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_DIR: Plugins/BPExecFlowViewer
  PLUGIN_FILE: Plugins/BPExecFlowViewer/BPExecFlowViewer.uplugin

jobs:
  package-source:
    name: Package source
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_zip: ${{ steps.zip.outputs.source_zip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Zip plugin source
        id: zip
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUT="BPExecFlowViewer-${VERSION}-source.zip"
          cd "${{ env.PLUGIN_DIR }}"
          zip -r "../../${OUT}" . \
            -x "Binaries/*" \
            -x "Intermediate/*" \
            -x ".vs/*" \
            -x "*.sln" \
            -x "*.suo"
          cd ../..
          echo "source_zip=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: ${{ steps.zip.outputs.source_zip }}
          if-no-files-found: error

  build-win64:
    name: Build Win64 package
    # Must run on YOUR Windows PC (self-hosted), not GitHub's cloud runners — UE is not on those machines.
    runs-on: self-hosted
    needs: package-source
    if: >-
      secrets.UE_ROOT != ''
      && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    env:
      UE_ROOT: ${{ secrets.UE_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            $v = '0.0.0-manual'
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: RunUAT BuildPlugin
        shell: pwsh
        run: |
          $plugin = Join-Path $env:GITHUB_WORKSPACE "${{ env.PLUGIN_FILE }}"
          $out = Join-Path $env:GITHUB_WORKSPACE "_package\BPExecFlowViewer"
          $uat = Join-Path $env:UE_ROOT "Engine\Build\BatchFiles\RunUAT.bat"
          if (-not (Test-Path $uat)) {
            throw "RunUAT not found at $uat — check the UE_ROOT repository secret."
          }
          & $uat BuildPlugin -Plugin="$plugin" -Package="$out" -TargetPlatforms=Win64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Zip Win64 package
        id: zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $archive = "BPExecFlowViewer-${version}-Win64.zip"
          $root = Join-Path $env:GITHUB_WORKSPACE "_package\BPExecFlowViewer"
          if (-not (Test-Path $root)) { throw "Package folder missing: $root" }
          Compress-Archive -Path (Join-Path $root '*') -DestinationPath (Join-Path $env:GITHUB_WORKSPACE $archive) -Force
          "win64_zip=$archive" >> $env:GITHUB_OUTPUT

      - name: Upload Win64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win64-zip
          path: ${{ steps.zip.outputs.win64_zip }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package-source, build-win64]
    if: >-
      always()
      && startsWith(github.ref, 'refs/tags/v')
      && needs.package-source.result == 'success'
      && (needs.build-win64.result == 'success' || needs.build-win64.result == 'skipped')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**
          fail_on_unmatched_files: false
