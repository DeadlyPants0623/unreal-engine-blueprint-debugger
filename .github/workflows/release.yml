# Tag push (v*) or manual dispatch → source zip on every tag; Win64 zip optional via self-hosted Windows runner.
#
# Secret (Win64 job only): UE_ROOT — e.g. C:\Program Files\Epic Games\UE_5.7

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_FILE: Plugins/BPExecFlowViewer/BPExecFlowViewer.uplugin

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-manual" >> "$GITHUB_OUTPUT"
          fi

  package-source:
    name: Package source
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip plugin source
        id: package
        uses: ./.github/actions/package-plugin-source
        with:
          version: ${{ needs.version.outputs.version }}

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

  build-win64:
    name: Build Win64 package
    needs: version
    runs-on: self-hosted
    continue-on-error: true
    env:
      UE_ROOT: ${{ secrets.UE_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify UE_ROOT
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UE_ROOT)) {
            throw "UE_ROOT secret is empty. Set it in repo Settings -> Secrets -> Actions."
          }
          $uat = Join-Path $env:UE_ROOT "Engine\Build\BatchFiles\RunUAT.bat"
          if (-not (Test-Path $uat)) { throw "RunUAT not found at: $uat" }
          Write-Host "Using UE at: $env:UE_ROOT"

      - name: Build plugin (RunUAT)
        shell: pwsh
        env:
          PACKAGE_OUT: ${{ github.workspace }}\_package\BPExecFlowViewer
        run: |
          & "${{ github.workspace }}\Scripts\PackageForFab.bat"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Zip Win64 package
        id: zip
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $archive = "BPExecFlowViewer-${version}-Win64.zip"
          $root = Join-Path $env:GITHUB_WORKSPACE "_package\BPExecFlowViewer"
          if (-not (Test-Path $root)) { throw "Package folder missing: $root" }
          Compress-Archive -Path (Join-Path $root '*') -DestinationPath (Join-Path $env:GITHUB_WORKSPACE $archive) -Force
          "win64_zip=$archive" >> $env:GITHUB_OUTPUT

      - name: Upload Win64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win64-zip
          path: ${{ steps.zip.outputs.win64_zip }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [version, package-source, build-win64]
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.package-source.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download source zip
        uses: actions/download-artifact@v4
        with:
          name: source-zip
          path: release-files

      - name: Download Win64 zip (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: win64-zip
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/**
          fail_on_unmatched_files: false
