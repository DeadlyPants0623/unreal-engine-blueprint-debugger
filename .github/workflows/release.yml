# Tag push (v*) → plugin source zip → GitHub Release (pre-release).
# Same zip for end-user install and Fab project file link.
# Manual workflow_dispatch packages as "0.0.0-manual" (artifact only, no release).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_FILE: Plugins/BPExecFlowViewer/BPExecFlowViewer.uplugin
  PRODUCT_SLUG: Blueprint-Exec-Flow-Viewer

jobs:

  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-manual" >> "$GITHUB_OUTPUT"
          fi

  package-source:
    name: Package plugin zip
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Zip plugin source
        id: package
        uses: ./.github/actions/package-plugin-source
        with:
          version: ${{ needs.version.outputs.version }}
          product_slug: ${{ env.PRODUCT_SLUG }}

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PRODUCT_SLUG }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [version, package-source]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download plugin zip
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PRODUCT_SLUG }}
          path: release-files

      - name: Recreate release and upload asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # This workflow is often re-run by re-pushing tags (e.g. to rebuild the zip).
          # Recreate the release to avoid flaky "tag_name already_exists" finalization
          # errors seen with other release actions on reruns.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          gh release create "$TAG" release-files/* \
            --prerelease \
            --generate-notes
